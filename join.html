<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>회원가입 — REVION ℞</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div data-partial="announce"></div>
<div data-partial="header"></div>

<main class="auth">
  <div class="auth-card auth-card--wide">
    <div class="auth-card__head">
      <h1 class="auth-card__title">회원가입</h1>
      <p class="auth-card__sub">레비온 회원이 되시면 첫 구매 10% 할인과 무료배송 쿠폰을 드려요.</p>
    </div>

    <form>
      <div class="field">
        <label class="field__label" for="join-email">이메일<span class="req">*</span></label>
        <div class="field__input">
          <input type="email" id="join-email" placeholder="example@revionrx.com" autocomplete="email" />
          <button type="button">중복확인</button>
        </div>
        <p class="field__hint">로그인 시 사용할 이메일 주소를 입력해 주세요.</p>
      </div>

      <div class="field">
        <label class="field__label" for="join-pw">비밀번호<span class="req">*</span></label>
        <div class="field__input">
          <input type="password" id="join-pw" placeholder="영문, 숫자, 특수문자 포함 8~20자" autocomplete="new-password" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="join-pw2">비밀번호 확인<span class="req">*</span></label>
        <div class="field__input">
          <input type="password" id="join-pw2" placeholder="비밀번호를 한번 더 입력" autocomplete="new-password" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="join-name">이름<span class="req">*</span></label>
        <div class="field__input">
          <input type="text" id="join-name" placeholder="이름" autocomplete="name" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="join-phone">휴대폰 번호<span class="req">*</span></label>
        <div class="field__input">
          <input type="tel" id="join-phone" placeholder="010-0000-0000" autocomplete="tel" />
          <button type="button">인증번호 받기</button>
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="join-otp">인증번호<span class="req">*</span></label>
        <div class="field__input">
          <input type="text" id="join-otp" placeholder="6자리 인증번호" inputmode="numeric" maxlength="6" />
          <button type="button">확인</button>
        </div>
        <p class="field__hint">3분 이내 입력해주세요.</p>
      </div>

      <div class="field">
        <label class="field__label" for="join-birth">생년월일</label>
        <div class="field__input">
          <input type="text" id="join-birth" placeholder="YYYY.MM.DD" inputmode="numeric" />
        </div>
      </div>

      <ul class="terms" aria-label="약관 동의">
        <label class="terms__all">
          <input type="checkbox" id="agree-all" />
          <span>전체 약관에 동의합니다</span>
        </label>
        <li>
          <label style="display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;">
            <input type="checkbox" name="agree" />
            <span>만 14세 이상입니다</span>
          </label>
          <span class="req-tag">필수</span>
        </li>
        <li>
          <label style="display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;">
            <input type="checkbox" name="agree" />
            <span>이용약관 동의</span>
          </label>
          <a href="#" style="color:var(--ink-4); font-size:11px; margin-left:8px;">보기</a>
          <span class="req-tag">필수</span>
        </li>
        <li>
          <label style="display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;">
            <input type="checkbox" name="agree" />
            <span>개인정보 수집 및 이용 동의</span>
          </label>
          <a href="#" style="color:var(--ink-4); font-size:11px; margin-left:8px;">보기</a>
          <span class="req-tag">필수</span>
        </li>
        <li>
          <label style="display:flex; align-items:center; gap:10px; flex:1; cursor:pointer;">
            <input type="checkbox" name="agree" />
            <span>마케팅 정보 수신 동의 (이메일/SMS)</span>
          </label>
          <span class="opt-tag">선택</span>
        </li>
      </ul>

      <div class="auth-actions" style="margin-top: 24px;">
        <button type="submit" class="btn btn--primary">회원가입 완료</button>
      </div>
    </form>

    <p class="auth-footer">
      이미 계정이 있으신가요? <a href="login.html">로그인</a>
    </p>
  </div>
</main>

<div data-partial="footer"></div>
<script src="partials.js"></script>
<script>
  /* 전체 동의 토글 */
  const all = document.getElementById('agree-all');
  const items = document.querySelectorAll('input[name="agree"]');
  all?.addEventListener('change', () => items.forEach(i => i.checked = all.checked));
  items.forEach(i => i.addEventListener('change', () => {
    all.checked = Array.from(items).every(x => x.checked);
  }));
</script>
</body>
</html>
