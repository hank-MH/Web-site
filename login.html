<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>로그인 — REVION ℞</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div data-partial="announce"></div>
<div data-partial="header"></div>

<main class="auth">
  <div class="auth-card">
    <div class="auth-card__head">
      <h1 class="auth-card__title">로그인</h1>
      <p class="auth-card__sub">레비온 회원에게 더 많은 혜택이 기다리고 있어요.</p>
    </div>

    <form>
      <div class="field">
        <label class="field__label" for="login-id">이메일 또는 휴대폰 번호</label>
        <div class="field__input">
          <input type="text" id="login-id" placeholder="example@revionrx.com" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="login-pw">비밀번호</label>
        <div class="field__input">
          <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" />
        </div>
      </div>

      <div class="auth-row">
        <label><input type="checkbox" /> 로그인 상태 유지</label>
        <span><a href="#">비밀번호 찾기</a> · <a href="#">아이디 찾기</a></span>
      </div>

      <div class="auth-actions">
        <button type="submit" class="btn btn--primary">로그인</button>
      </div>
    </form>

    <div class="auth-divider">SNS 계정으로 간편 로그인</div>

    <div class="social-grid">
      <a class="social-btn social-btn--kakao" href="#" aria-label="카카오로 로그인">K</a>
      <a class="social-btn social-btn--naver" href="#" aria-label="네이버로 로그인">N</a>
      <a class="social-btn social-btn--apple" href="#" aria-label="애플로 로그인">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.487 2.21-1.27 2.97-.85.83-2.07 1.41-3.13 1.32-.13-1.13.42-2.27 1.21-3.04.85-.86 2.05-1.42 3.19-1.25Zm4.21 16.93c-.59 1.36-.88 1.96-1.65 3.16-1.07 1.66-2.58 3.73-4.45 3.74-1.66.02-2.09-1.07-4.34-1.06-2.25.01-2.72 1.08-4.39 1.07-1.87-.02-3.3-1.88-4.37-3.54-3-4.65-3.32-10.1-1.47-12.99 1.31-2.05 3.39-3.25 5.34-3.25 1.99 0 3.24 1.09 4.88 1.09 1.6 0 2.57-1.09 4.88-1.09 1.74 0 3.59.95 4.91 2.59-4.32 2.37-3.62 8.55.66 10.28Z"/></svg>
      </a>
      <a class="social-btn social-btn--google" href="#" aria-label="구글로 로그인">G</a>
    </div>

    <p class="auth-footer">
      아직 회원이 아니신가요? <a href="join.html">회원가입</a>
    </p>
  </div>
</main>

<div data-partial="footer"></div>
<script src="partials.js"></script>
</body>
</html>
