<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>장바구니 — REVION ℞</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div data-partial="announce"></div>
<div data-partial="header"></div>

<main class="cart-page">
  <div class="container">
    <h1 class="cart-title">장바구니</h1>
    <div class="cart-layout">
      <div>
        <div id="cart-list" class="cart-list" hidden></div>
        <div id="cart-empty" class="cart-empty">
          <p>장바구니가 비어있어요.</p>
          <a href="shop.html" class="btn btn--primary">쇼핑하러 가기</a>
        </div>
      </div>
      <aside class="cart-summary">
        <h3>주문 금액</h3>
        <div class="cart-summary__row"><span>상품 금액</span><strong id="sum-subtotal">0원</strong></div>
        <div class="cart-summary__row"><span>배송비</span><strong id="sum-shipping">0원</strong></div>
        <div class="cart-summary__row" style="color:var(--sale)"><span>할인</span><strong id="sum-discount">-0원</strong></div>
        <div class="cart-summary__total">
          <span>총 결제 금액</span>
          <strong id="sum-total">0원</strong>
        </div>
        <button class="btn btn--primary" id="checkout-btn">결제하기</button>
        <a href="shop.html" class="btn btn--cart" style="background:#fff; margin-top: 8px;">쇼핑 더 하기</a>
      </aside>
    </div>
  </div>
</main>

<div data-partial="footer"></div>
<script src="partials.js"></script>
<script src="cart.js"></script>
</body>
</html>
